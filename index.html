<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Video Downloader</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:#111827;
padding:25px;
border-radius:18px;
width:90%;
max-width:420px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-top:10px;
}

button{
margin-top:15px;
padding:12px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
width:100%;
font-size:16px;
}

#loader{
display:none;
margin-top:20px;
}

video{
width:100%;
margin-top:15px;
border-radius:10px;
display:none;
}

</style>

</head>

<body>

<div class="card">

<h2>Instagram / Facebook Downloader</h2>

<input id="link" placeholder="Paste Reel / Video link">

<button onclick="download()">Download Video</button>

<div id="loader">
<p>Downloading...</p>
</div>

<video id="video" controls></video>

</div>

<script>

async function download(){

let link=document.getElementById("link").value

if(!link){
alert("Paste link first")
return
}

document.getElementById("loader").style.display="block"

try{

let api=`https://api.allorigins.win/raw?url=${encodeURIComponent("https://api.ryzendesu.vip/api/downloader/fbdl?url="+link)}`

let res=await fetch(api)

let data=await res.json()

let videoURL=data.data[0].url

document.getElementById("loader").style.display="none"

let video=document.getElementById("video")

video.src=videoURL
video.style.display="block"

if(window.Telegram){
Telegram.WebApp.sendData(videoURL)
}

}catch(e){

document.getElementById("loader").style.display="none"
alert("Download failed")

}

}

</script>

</body>
</html>
