<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BG Remover</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.box{
background:#1e293b;
padding:20px;
border-radius:15px;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

#downloadBtn{
background:#3b82f6;
display:none;
}

.coin{
font-size:20px;
margin-bottom:10px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:#111827;
padding:25px;
border-radius:15px;
}

</style>
</head>

<body>

<div class="box">

<h2>AI Background Remover</h2>

<div class="coin">
Coins: <span id="coins">0</span>
</div>

<input type="file" id="upload">

<br>

<button onclick="removeBG()">Remove Background</button>

<br>

<img id="preview" width="250">

<br>

<button id="downloadBtn" onclick="showPopup()">Download HD</button>

</div>

<!-- popup -->

<div class="popup" id="popup">

<div class="popup-box">

<h3>Unlock HD</h3>

<p>Use 10 Coins</p>

<button onclick="unlockDownload()">Unlock</button>

<button onclick="closePopup()">Cancel</button>

</div>

</div>

<script>

let coins = localStorage.getItem("coins") || 0
document.getElementById("coins").innerText = coins

let resultImage = ""

function removeBG(){

let file = document.getElementById("upload").files[0]

let formData = new FormData()
formData.append("image_file", file)

fetch("https://api.remove.bg/v1.0/removebg", {
method:"POST",
headers:{
"X-Api-Key":"GycHN7qSDN9SUqvUkogEnoVb"
},
body:formData
})
.then(res=>res.blob())
.then(blob=>{

resultImage = URL.createObjectURL(blob)

document.getElementById("preview").src = resultImage

document.getElementById("downloadBtn").style.display="inline-block"

coins = parseInt(coins) + 10
localStorage.setItem("coins",coins)

document.getElementById("coins").innerText = coins

})

}

function showPopup(){

document.getElementById("popup").style.display="flex"

}

function closePopup(){

document.getElementById("popup").style.display="none"

}

function unlockDownload(){

if(coins < 10){

alert("Not enough coins")

return

}

coins = coins - 10
localStorage.setItem("coins",coins)

document.getElementById("coins").innerText = coins

// download

let a = document.createElement("a")
a.href = resultImage
a.download="bg_removed.png"
a.click()

// open adsterra

window.open("https://www.effectivegatecpm.com/bupvhwz5?key=eaedd439f3f1d2db330f017cf0cb29ca")

// send photo telegram chat

Telegram.WebApp.sendData(resultImage)

closePopup()

}

</script>

</body>
</html>
